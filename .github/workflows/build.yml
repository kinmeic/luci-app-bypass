name: Build & Release

# Builds luci-app-bypass for BOTH OpenWrt packaging systems in parallel:
#   - 24.10.0  -> .ipk (opkg)  for OpenWrt 24.10 stable & older
#   - SNAPSHOT -> .apk (apk)   for OpenWrt main snapshot & 25.x+ (apk default)
# Both are arch-independent (LUCI_PKGARCH:=all), so one x86_64 build per format
# covers every target. Dependencies and the postinst/prerm scripts are resolved
# and emitted by each SDK's own buildroot, so each package installs cleanly on
# its target package manager.
#
# Why a matrix and not a repackaged .ipk->.apk: OpenWrt 24.10 explicitly ships
# opkg (USE_APK is disabled there); apk is the default ONLY on the main branch.
# A .ipk's Depends (e.g. libubox20240329, libc) and luci.mk-generated postinst
# are resolved for opkg, so manually re-wrapping them as .apk would carry the
# wrong dependency names and opkg-only script hooks. Building the .apk with the
# apk-based (snapshot) SDK lets the buildroot produce a correct .apk instead.
#
# Triggers:
#   - push tag v*            -> build + publish release (version = tag w/o 'v')
#   - workflow_dispatch      -> build + publish release (version = input)
#
# Note: OpenWrt 23.05 is no longer built (it ships libubox20230523 which is
# incompatible with the libubox20240329 dependency produced by the 24.10 SDK).
# 23.05 users should stay on v1.0.0 (the last 23.05 release).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0)'
        required: true
        default: '1.4.6'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # OpenWrt 24.10 stable -> opkg/.ipk
          - sdk: "24.10.0"
            label: "24.10 (ipk)"
          # OpenWrt main snapshot -> apk/.apk (apk is default on main; 24.10
          # disables USE_APK, so only the snapshot SDK emits .apk)
          - sdk: "SNAPSHOT"
            label: "snapshot (apk)"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            expected="${GITHUB_REF_NAME#v}"
          else
            expected="$INPUT_VERSION"
          fi
          actual="$(sed -n 's/^PKG_VERSION:=//p' Makefile | head -n1)"
          file_version="$(tr -d '\r\n' < root/usr/share/bypass/version)"
          [[ "$actual" == "$expected" && "$file_version" == "$expected" ]] || {
            echo "Version mismatch: trigger=$expected Makefile=$actual version-file=$file_version" >&2
            exit 1
          }

      - name: Set up feed structure
        shell: bash
        run: |
          set -euo pipefail
          # gh-action-sdk installs a feed by scanning *subdirectories* of
          # FEED_DIR for per-package Makefiles. Our Makefile lives at the repo
          # root, so copy the sources into feed/luci-app-bypass/ and point
          # FEED_DIR at feed/. The Makefile uses an absolute
          # `include $(TOPDIR)/feeds/luci/luci.mk`, so it resolves once the
          # official luci feed is installed by the SDK action.
          mkdir -p feed/luci-app-bypass
          rsync -a \
            --exclude='.git' \
            --exclude='feed' \
            --exclude='.github' \
            --exclude='dist' \
            ./ feed/luci-app-bypass/

      - name: Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v8
        env:
          # ARCH = <target>-<version>; luci-app-bypass is LUCI_PKGARCH:=all so a
          # single x86_64 SDK build produces an arch-independent package.
          ARCH: "x86_64-${{ matrix.sdk }}"
          FEEDNAME: bypass
          FEED_DIR: ${{ github.workspace }}/feed
          PACKAGES: luci-app-bypass
          NO_SHFMT_CHECK: 1
          NO_REFRESH_CHECK: 1

      - name: Collect built package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          echo "=== bin/packages tree (${{ matrix.label }}) ==="
          find bin/packages -type f 2>/dev/null || echo "(no bin/packages)"
          found=0
          # Accept whichever format the SDK produced: 24.10 -> .ipk,
          # SNAPSHOT -> .apk. Keep the original buildroot filename — .ipk and
          # .apk use different naming + extensions, so there is no collision
          # when the release job merges both artifacts.
          for f in $(find bin/packages -type f \( -name "luci-app-bypass*.ipk" -o -name "luci-app-bypass*.apk" \) 2>/dev/null); do
            cp "$f" "dist/$(basename "$f")"
            found=1
            echo "  collected: $f -> dist/$(basename "$f")"
          done
          [ "$found" = "1" ] || { echo "No package produced for ${{ matrix.label }}; failing"; exit 1; }
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.sdk }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    # Only publish once BOTH formats built successfully — no half-releases.
    # (fail-fast:false above keeps a single matrix failure from cancelling the
    # other; if either still fails, this job is skipped so we can fix and retag.)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: packages-*
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: release-assets/*
