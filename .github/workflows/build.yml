name: Build & Release

# Builds the luci-app-bypass package for OpenWrt 24.10 (.ipk, or .apk when the
# SDK is built with CONFIG_APK) using the official OpenWrt SDK via
# openwrt/gh-action-sdk, then publishes a GitHub release with the package(s)
# attached.
#
# Triggers:
#   - push tag v*            -> build + publish release (version = tag w/o 'v')
#   - workflow_dispatch      -> build + publish release (version = input)
#
# Note: OpenWrt 23.05 is no longer built (it ships libubox20230523 which is
# incompatible with the libubox20240329 dependency produced by the 24.10 SDK).
# 23.05 users should stay on v1.0.0 (the last 23.05 release).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.1.0)'
        required: true
        default: '1.1.0'

permissions:
  contents: write

jobs:
  build:
    name: Build (OpenWrt 24.10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up feed structure
        shell: bash
        run: |
          set -euo pipefail
          # gh-action-sdk installs a feed by scanning *subdirectories* of
          # FEED_DIR for per-package Makefiles. Our Makefile lives at the repo
          # root, so copy the sources into feed/luci-app-bypass/ and point
          # FEED_DIR at feed/. The Makefile uses an absolute
          # `include $(TOPDIR)/feeds/luci/luci.mk`, so it resolves once the
          # official luci feed is installed by the SDK action.
          mkdir -p feed/luci-app-bypass
          rsync -a \
            --exclude='.git' \
            --exclude='feed' \
            --exclude='.github' \
            --exclude='dist' \
            ./ feed/luci-app-bypass/
          echo "PKG_NAME=luci-app-bypass" >> "$GITHUB_ENV"

      - name: Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v8
        env:
          # ARCH = <target>-<version>; luci-app-bypass is LUCI_PKGARCH:=all so a
          # single x86_64 SDK build produces an arch-independent package.
          ARCH: "x86_64-24.10.0"
          FEEDNAME: bypass
          FEED_DIR: ${{ github.workspace }}/feed
          PACKAGES: luci-app-bypass
          NO_SHFMT_CHECK: 1
          NO_REFRESH_CHECK: 1

      - name: Collect built package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          echo "=== bin/packages tree (diagnostic) ==="
          find bin/packages -type f 2>/dev/null || echo "(no bin/packages)"
          found=0
          # Accept whichever format the SDK produced (.ipk by default, .apk when
          # the 24.10 SDK is built with CONFIG_APK). Keep the original filename
          # as emitted by the buildroot — no SDK-version suffix is needed now
          # that only one OpenWrt version is built.
          for f in $(find bin/packages -type f \( -name "luci-app-bypass*.ipk" -o -name "luci-app-bypass*.apk" \) 2>/dev/null); do
            cp "$f" "dist/$(basename "$f")"
            found=1
            echo "  collected: $f -> dist/$(basename "$f")"
          done
          [ "$found" = "1" ] || { echo "No package produced; failing"; exit 1; }
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-24.10
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: packages-*
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: release-assets/*
